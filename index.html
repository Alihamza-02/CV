<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Driving Game</title>
    <style>
        body { margin: 0; background: #333; }
        canvas { display: block; margin: auto; background: #555; }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const carWidth = 40, carHeight = 80;
let carX = canvas.width / 2 - carWidth / 2;
const carY = canvas.height - carHeight - 20;
let carSpeed = 5;

const enemyWidth = 40, enemyHeight = 80;
let enemyX = Math.random() * (canvas.width - enemyWidth);
let enemyY = -enemyHeight;
let enemySpeed = 4;

let score = 0;
let gameOver = false;

function drawCar(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, carWidth, carHeight);
}

function update() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Move enemy
    enemyY += enemySpeed;
    if (enemyY > canvas.height) {
        enemyY = -enemyHeight;
        enemyX = Math.random() * (canvas.width - enemyWidth);
        score++;
        enemySpeed += 0.2;
    }

    // Collision
    if (carX < enemyX + enemyWidth &&
        carX + carWidth > enemyX &&
        carY < enemyY + enemyHeight &&
        carY + carHeight > enemyY) {
        gameOver = true;
        alert("Game Over! Score: " + score);
        return;
    }

    // Draw road & cars
    ctx.fillStyle = "#666";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawCar(carX, carY, "blue");
    drawCar(enemyX, enemyY, "red");

    // Score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 20);

    requestAnimationFrame(update);
}

// Controls
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" && carX > 0) carX -= carSpeed;
    if (e.key === "ArrowRight" && carX < canvas.width - carWidth) carX += carSpeed;
});

update();
</script>
</body>
</html>
